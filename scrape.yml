name: PM Job Tracker

on:
  schedule:
    # Runs every 6 hours: 12am, 6am, 12pm, 6pm IST (subtract 5:30 for UTC)
    - cron: "30 0 * * *"   # 6:00 AM IST
    - cron: "30 6 * * *"   # 12:00 PM IST
    - cron: "30 12 * * *"  # 6:00 PM IST
    - cron: "30 18 * * *"  # 12:00 AM IST (next day)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GMAIL_SENDER:   ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
        run: python scraper.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push
